query GetPublicPosts @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  posts(orderBy: [{createdAt: DESC}], limit: 10) {
    id
    title
    content
    createdAt
    author {
      id
      username
    }
    comments(limit: 3) {
      id
      text
      createdAt
      author {
        id
        username
      }
    }
  }
}

query GetMyProfile @auth(level: USER) {
  user(where: {id: {eq_expr: "auth.uid"}}) {
    id
    username
    email
    bio
    posts(orderBy: [{createdAt: DESC}]) {
      id
      title
      content
      createdAt
    }
  }
}

mutation CreatePost($title: String!, $content: String!) @auth(level: USER) {
  post_insert(data: {
    title: $title,
    content: $content,
    authorId_expr: "auth.uid",
    createdAt_expr: "request.time"
  })
}

mutation AddCommentToPost($postId: UUID!, $text: String!) @auth(level: USER) {
  comment_insert(data: {
    postId: $postId,
    authorId_expr: "auth.uid",
    text: $text,
    createdAt_expr: "request.time"
  })
}